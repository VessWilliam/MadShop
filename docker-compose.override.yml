services:
  catalog.db:
    container_name: catalogdb
    environment:
     - POSTGRES_USER=postgres
     - POSTGRES_PASSWORD=root123
     - POSTGRES_DB=catalogdb
    restart: always
    ports:
     - "5433:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalogdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  basket.db:
    container_name: basketdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root123
      - POSTGRES_DB=basketdb
    restart: always
    ports:
      - "5434:5432"
    volumes:
      - postgres_basket:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d basketdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache.db:
    container_name: cachedb
    image: redis
    restart: always
    ports:
      - "6379:6379"

  catalog.api:
    container_name: catalogapi
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081

      - ASPNETCORE_Kestrel__Certificates__Default__Path=/root/.aspnet/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=root123

      - ConnectionStrings__Database=Server=catalogdb;Port=5432;Database=catalogdb;Username=postgres;Password=root123

    ports:
      - "6000:8080"
      - "6060:8081"

    volumes:
      - ${USERPROFILE}/.aspnet/https:/root/.aspnet/https:ro  
    depends_on:
      catalog.db:
        condition: service_healthy